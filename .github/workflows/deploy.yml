# Vera CI/CD — build, test, and deploy all services to AWS ECS.
#
# AWS auth: GitHub OIDC → assume IAM role gha-oidc-deploy.  No
# long-lived access keys in repo secrets (Stage H.4 / PCI DSS 8.3).
# The role's trust policy restricts assumption to:
#   repo:andtechxyz/karta.cards.palisade:*
#   repo:andtechxyz/karta.cards.vera:*
# Both repos share the role + inline policy (ecr push / ecs deploy /
# iam:PassRole on task roles); rotation = update one IAM resource.
#
# Cost-optimisations applied (mirrors Palisade):
#   - `paths-ignore` skips on docs / config / applet-only commits
#   - `concurrency` cancels queued runs on rapid-fire pushes
#   - `actions/setup-node@v4` with `cache: 'npm'` reuses the npm cache
#   - `docker/build-push-action@v6` with GHA layer cache

name: Deploy

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'applets/**'
      - '.vscode/**'
      - '.gitignore'
      - '.gitattributes'
      - '**/CODEOWNERS'
      - 'test-fixtures/**'

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

env:
  AWS_REGION: ap-southeast-2
  ECR_REGISTRY: 600743178530.dkr.ecr.ap-southeast-2.amazonaws.com
  ECS_CLUSTER: vera

permissions:
  contents: read
  # OIDC — configure-aws-credentials@v4 exchanges the GitHub-minted
  # JWT for a short-lived IAM role session.  sts:AssumeRoleWithWebIdentity.
  id-token: write

jobs:
  # ---------------------------------------------------------------------------
  # Test — install, type-check, run tests
  # ---------------------------------------------------------------------------
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - run: npm ci
      - run: npm audit --audit-level=high
        continue-on-error: true
      - run: npx prisma generate --schema packages/db/prisma/schema.prisma
      - run: npx tsc -b
      - run: npx vitest run

  # ---------------------------------------------------------------------------
  # Build & Deploy — one job per service via matrix
  # ---------------------------------------------------------------------------
  build-and-deploy:
    name: Deploy ${{ matrix.service }}
    needs: test
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Post-split: Vera owns vault + pay + admin-lite only.  All
        # card-domain services (tap, activation, rca, data-prep,
        # batch-processor, sftp, card-ops) live on the Palisade repo at
        # github.com/andtechxyz/karta.cards.palisade and deploy from
        # there via their own workflow.  Same AWS account + cluster +
        # ECR registry — just a different git origin.
        include:
          - service: pay
            port: 3003
          - service: vault
            port: 3004
          - service: admin
            port: 3005

    env:
      IMAGE_TAG: ${{ github.sha }}
      ECR_REPO: vera-${{ matrix.service }}

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        # Stage H.4 — short-lived creds via GitHub OIDC.  Role +
        # trust policy in AWS IAM account 600743178530; see Palisade
        # commit history for provisioning or scripts/aws-setup.sh.
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::600743178530:role/gha-oidc-deploy
          role-session-name: gha-vera-${{ github.run_id }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Log in to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Compute short SHA
        id: sha
        run: echo "short=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile || 'Dockerfile' }}
          build-args: |
            SERVICE=${{ matrix.service }}
          push: true
          tags: |
            ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPO }}:${{ steps.sha.outputs.short }}
            ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPO }}:latest
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}

      - name: Update ECS task definition and deploy
        run: |
          SERVICE_NAME=vera-${{ matrix.service }}
          FULL_IMAGE=${{ env.ECR_REGISTRY }}/${{ env.ECR_REPO }}:${{ steps.sha.outputs.short }}

          # Fetch the current task definition
          TASK_DEF_ARN=$(aws ecs describe-services \
            --cluster ${{ env.ECS_CLUSTER }} \
            --services ${SERVICE_NAME} \
            --query 'services[0].taskDefinition' \
            --output text)

          TASK_DEF=$(aws ecs describe-task-definition \
            --task-definition "${TASK_DEF_ARN}" \
            --query 'taskDefinition')

          # Update the container image in the task definition and register a new revision
          NEW_TASK_DEF=$(echo "${TASK_DEF}" | \
            jq --arg IMAGE "${FULL_IMAGE}" \
              '.containerDefinitions[0].image = $IMAGE' | \
            jq 'del(.taskDefinitionArn, .revision, .status, .requiresAttributes, .compatibilities, .registeredAt, .registeredBy)')

          NEW_TASK_DEF_ARN=$(aws ecs register-task-definition \
            --cli-input-json "${NEW_TASK_DEF}" \
            --query 'taskDefinition.taskDefinitionArn' \
            --output text)

          # Update the ECS service to use the new task definition
          aws ecs update-service \
            --cluster ${{ env.ECS_CLUSTER }} \
            --service ${SERVICE_NAME} \
            --task-definition "${NEW_TASK_DEF_ARN}" \
            --force-new-deployment \
            --query 'service.serviceName' \
            --output text

          echo "Deployed ${FULL_IMAGE} to ${SERVICE_NAME} (task def: ${NEW_TASK_DEF_ARN})"
